<svg width="500" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark theme background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#2D2B55"/>
    </linearGradient>
    
    <!-- Neon text gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF79C6"/>
      <stop offset="50%" stop-color="#BD93F9"/>
      <stop offset="100%" stop-color="#8BE9FD"/>
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="10" y="10" width="480" height="130" rx="20" fill="url(#bgGrad)" filter="url(#dropShadow)"/>

  <!-- Cloud / Upload Icon -->
  <g transform="translate(40, 35)">
    <!-- Cloud shape -->
    <path d="M 75 70 
             L 25 70 
             C 10 70 5 55 15 45 
             C 20 30 40 25 50 40 
             C 60 15 95 20 95 45 
             C 105 45 105 70 90 70 
             Z" 
          fill="none" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Upload Arrow -->
    <path d="M 50 65 L 50 35 M 35 50 L 50 35 L 65 50" 
          fill="none" stroke="#50FA7B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Typography -->
  <text x="160" y="90" font-family="Consolas, 'Courier New', monospace" font-size="48" font-weight="bold" fill="#F8F8F2">
    Go<tspan fill="url(#neonGrad)">File</tspan><tspan fill="#6272A4" font-weight="normal">CLI</tspan>
  </text>

  <!-- Terminal decorative element -->
  <g transform="translate(160, 110)">
    <rect width="20" height="4" fill="#50FA7B">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>